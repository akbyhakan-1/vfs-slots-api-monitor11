<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VFS Slot Monitor — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #22263a;
    --border:    #2e3348;
    --text:      #e2e6f0;
    --muted:     #8892aa;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #eab308;
    --gray:      #6b7280;
    --blue:      #3b82f6;
    --radius:    12px;
    --shadow:    0 4px 24px rgba(0,0,0,.45);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  header {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -.3px;
  }
  header h1 span { color: var(--blue); }
  #meta { font-size: 12px; color: var(--muted); line-height: 1.6; text-align: right; }
  #countdown {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  #countdown .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .3; }
  }

  /* ── Country Grid ── */
  #grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* ── Country Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .card-flag { font-size: 2rem; line-height: 1; }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .card-links { margin-top: 6px; display: flex; gap: 8px; }
  .card-links a {
    font-size: 11px;
    color: var(--blue);
    text-decoration: none;
    padding: 2px 8px;
    border: 1px solid var(--blue);
    border-radius: 12px;
    transition: background .15s;
  }
  .card-links a:hover { background: rgba(59,130,246,.15); }

  /* ── Centres Table ── */
  .centers { padding: 12px 0; }
  .center-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .center-row:last-child { border-bottom: none; }
  .center-row:hover { background: var(--surface2); }

  .badge {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge.slot_found { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .badge.no_slot    { background: var(--red); }
  .badge.waitlist   { background: var(--yellow); }
  .badge.error      { background: var(--yellow); }
  .badge.unknown    { background: var(--gray); }

  .center-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .center-detail {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .center-detail .date {
    color: var(--green);
    font-weight: 600;
  }
  .status-label {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .status-label.slot_found { background: rgba(34,197,94,.18); color: var(--green); }
  .status-label.no_slot    { background: rgba(239,68,68,.15); color: var(--red); }
  .status-label.waitlist   { background: rgba(234,179,8,.15); color: var(--yellow); }
  .status-label.error      { background: rgba(234,179,8,.15); color: var(--yellow); }
  .status-label.unknown    { background: rgba(107,114,128,.2); color: var(--gray); }

  /* ── Empty / Loading States ── */
  #loading, #empty {
    max-width: 1100px;
    margin: 60px auto;
    text-align: center;
    color: var(--muted);
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Legend ── */
  #legend {
    max-width: 1100px;
    margin: 28px auto 0;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    header { flex-direction: column; align-items: flex-start; }
    #meta  { text-align: left; }
    #grid  { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>VFS Slot Monitor <span>Dashboard</span></h1>
    <div id="meta">
      Son güncelleme: <span id="last-updated">—</span><br>
      Bir sonraki yenileme: <span id="next-refresh">10</span>s
    </div>
  </div>
  <div id="countdown"><span class="dot"></span> Canlı İzleme</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p>Durum yükleniyor…</p>
</div>

<div id="empty" style="display:none">
  <p style="font-size:2rem;margin-bottom:8px">📭</p>
  <p>Henüz durum verisi yok.</p>
  <p style="margin-top:8px;font-size:12px">
    <code>python3 PingVFS.py --country nld</code> veya <code>python3 run_all.py</code> çalıştırın.
  </p>
</div>

<div id="grid" style="display:none"></div>

<div id="legend">
  <div class="legend-item"><span class="badge slot_found"></span> Randevu Var</div>
  <div class="legend-item"><span class="badge no_slot"></span> Randevu Yok</div>
  <div class="legend-item"><span class="badge waitlist"></span> Bekleme Listesi / Hata</div>
  <div class="legend-item"><span class="badge unknown"></span> Henüz Kontrol Edilmedi</div>
</div>

<script>
const STATUS_URL = '/api/status';
const REFRESH_INTERVAL = 10; // seconds

const FLAG_MAP = {
  nld: '🇳🇱', hrv: '🇭🇷', deu: '🇩🇪', fra: '🇫🇷',
  ita: '🇮🇹', esp: '🇪🇸', aut: '🇦🇹', bel: '🇧🇪',
  che: '🇨🇭', cze: '🇨🇿', dnk: '🇩🇰', fin: '🇫🇮',
  grc: '🇬🇷', hun: '🇭🇺', irl: '🇮🇪', nor: '🇳🇴',
  pol: '🇵🇱', prt: '🇵🇹', swe: '🇸🇪',
};
const STATUS_LABEL = {
  slot_found: 'RANDEVU VAR 🎉',
  no_slot:    'Randevu Yok',
  waitlist:   'Bekleme Listesi',
  error:      'Hata',
  unknown:    'Bilinmiyor',
};

let countdown = REFRESH_INTERVAL;

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso.replace('T', ' '));
    return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return iso; }
}

function normaliseStatus(s) {
  if (!s) return 'unknown';
  s = s.toLowerCase();
  if (s === 'slot_found') return 'slot_found';
  if (s === 'waitlist')   return 'waitlist';
  if (s === 'error')      return 'error';
  if (s === 'no_slot')    return 'no_slot';
  return 'unknown';
}

function renderCenters(centers) {
  if (!centers || centers.length === 0) {
    return '<div style="padding:16px 20px;color:var(--muted);font-size:13px">Merkez verisi bekleniyor…</div>';
  }
  return centers.map(c => {
    const st = normaliseStatus(c.status);
    const dateHtml = c.earliest_date
      ? `<span class="date">${c.earliest_date}</span>`
      : '';
    const timeHtml = c.last_check
      ? `<br><span style="font-size:10px">${fmtTime(c.last_check)}</span>`
      : '';
    return `
      <div class="center-row">
        <span class="badge ${st}"></span>
        <span class="center-name">${c.name}</span>
        <span class="center-detail">${dateHtml}${timeHtml}</span>
        <span class="status-label ${st}">${STATUS_LABEL[st] || st}</span>
      </div>`;
  }).join('');
}

function renderGrid(data) {
  const countries = data.countries || {};
  const codes = Object.keys(countries);
  if (codes.length === 0) return null;

  return codes.map(code => {
    const c = countries[code];
    const flag = FLAG_MAP[code] || '🌍';
    const loginLink  = c.login_url  ? `<a href="${c.login_url}" target="_blank" rel="noopener">Giriş</a>` : '';
    const bookLink   = c.booking_url ? `<a href="${c.booking_url}" target="_blank" rel="noopener">Randevu Al</a>` : '';
    const lastCheck  = c.last_check  ? `Son kontrol: ${fmtTime(c.last_check)}` : '';
    const slotCount  = (c.centers || []).filter(x => normaliseStatus(x.status) === 'slot_found').length;
    const slotBadge  = slotCount > 0
      ? `<span style="color:var(--green);font-weight:600">${slotCount} randevu var!</span>`
      : '';
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-flag">${flag}</span>
          <div class="card-info">
            <div class="card-title">${c.name || code.toUpperCase()}</div>
            <div class="card-sub">${lastCheck} ${slotBadge}</div>
            <div class="card-links">${loginLink}${bookLink}</div>
          </div>
        </div>
        <div class="centers">${renderCenters(c.centers)}</div>
      </div>`;
  }).join('');
}

async function fetchStatus() {
  try {
    const res = await fetch(STATUS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch (e) {
    console.warn('Status fetch failed:', e);
    return null;
  }
}

async function refresh() {
  const data = await fetchStatus();
  const loadingEl = document.getElementById('loading');
  const emptyEl   = document.getElementById('empty');
  const gridEl    = document.getElementById('grid');
  const lastEl    = document.getElementById('last-updated');

  loadingEl.style.display = 'none';

  if (!data || !data.countries || Object.keys(data.countries).length === 0) {
    emptyEl.style.display = 'block';
    gridEl.style.display  = 'none';
    return;
  }

  emptyEl.style.display = 'none';
  gridEl.style.display  = 'grid';
  gridEl.innerHTML = renderGrid(data);
  lastEl.textContent = fmtTime(data.last_updated);
}

// Countdown ticker
function startCountdown() {
  countdown = REFRESH_INTERVAL;
  const el = document.getElementById('next-refresh');
  const tick = () => {
    el.textContent = countdown;
    if (countdown <= 0) {
      refresh().then(() => { countdown = REFRESH_INTERVAL; });
    }
    countdown--;
    setTimeout(tick, 1000);
  };
  tick();
}

refresh().then(startCountdown);
</script>
</body>
</html>
